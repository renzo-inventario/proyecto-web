<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Inventario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .search-box {
            margin-bottom: 30px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        
        input:focus {
            border-color: #007bff;
        }
        
        .results-info {
            margin-bottom: 20px;
            color: #666;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .product-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .product-sku {
            color: #007bff;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .product-description {
            font-size: 16px;
            margin-bottom: 15px;
            color: #333;
        }
        
        .product-photos {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .product-photos img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        
        .no-results {
            text-align: center;
            padding: 50px;
            color: #666;
            font-size: 18px;
        }
        
        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Buscador de Inventario</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar por SKU o descripción...">
        </div>
        
        <div id="results" class="results-info"></div>
        <div id="productGrid" class="product-grid"></div>
    </div>

    <script>
    let productos = [];
    
    function aString(valor) {
        if (valor === null || valor === undefined) return '';
        return String(valor);
    }
    
    // Cargar datos.json
    fetch('datos.json')
        .then(response => {
            if (!response.ok) throw new Error('No se pudo cargar datos.json');
            return response.json();
        })
        .then(data => {
            productos = data;
            document.getElementById('results').innerHTML = `📦 ${productos.length} productos cargados`;
            mostrarProductos(productos);
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('productGrid').innerHTML = '<div class="no-results">❌ Error cargando datos.json</div>';
        });
    
    function mostrarProductos(productosFiltrados) {
        const grid = document.getElementById('productGrid');
        
        if (!productosFiltrados || productosFiltrados.length === 0) {
            grid.innerHTML = '<div class="no-results">😕 No se encontraron productos</div>';
            document.getElementById('results').innerHTML = `🔍 0 resultados`;
            return;
        }
        
        let html = '';
        for (let producto of productosFiltrados) {
            const sku = aString(producto.SKU || producto.sku || producto.Name || '');
            const descripcion = aString(producto.Description || producto.description || '');
            
            html += `
                <div class="product-card">
                    <div class="product-sku">🔖 SKU: ${sku}</div>
                    <div class="product-description">📝 ${descripcion || 'Sin descripción'}</div>
                    <div class="product-photos" id="fotos-${sku.replace(/[^a-zA-Z0-9]/g, '')}"></div>
                </div>
            `;
        }
        
        grid.innerHTML = html;
        document.getElementById('results').innerHTML = `🔍 ${productosFiltrados.length} resultados encontrados`;
        
        // Después de agregar las tarjetas al HTML, cargar las fotos
        for (let producto of productosFiltrados) {
            const sku = aString(producto.SKU || producto.sku || producto.Name || '');
            const idFoto = `fotos-${sku.replace(/[^a-zA-Z0-9]/g, '')}`;
            const container = document.getElementById(idFoto);
            if (container) {
                cargarFotos(sku, container);
            }
        }
    }
    
    function cargarFotos(sku, container) {
        // Limpiar el contenedor
        container.innerHTML = '';
        
        let imagenesEncontradas = 0;
        
        // Intentar cargar imágenes desde _01 hasta _09
        for (let i = 1; i <= 9; i++) {
            const numero = i.toString().padStart(2, '0');
            // Probar primero con .png, si no funciona, se puede cambiar a .jpg
            const url = `https://www.atkits.com/assets/images/gallery/OT/${sku}/${sku}_${numero}.png`;
            
            const img = document.createElement('img');
            img.src = url;
            img.style.width = '80px';
            img.style.height = '80px';
            img.style.objectFit = 'cover';
            img.style.margin = '5px';
            img.style.border = '1px solid #ddd';
            img.style.borderRadius = '4px';
            img.alt = `Foto ${numero} de ${sku}`;
            
            // Si la imagen no carga (error 404), la ocultamos
            img.onerror = function() {
                this.style.display = 'none';
            };
            
            // Si la imagen carga, la mostramos
            img.onload = function() {
                this.style.display = 'block';
                imagenesEncontradas++;
            };
            
            container.appendChild(img);
        }
        
        // Si después de 1 segundo no hay imágenes, mostrar mensaje
        setTimeout(() => {
            if (imagenesEncontradas === 0) {
                container.innerHTML = '<div style="font-size: 12px; color: #999;">📁 Sin fotos disponibles para ' + sku + '</div>';
            }
        }, 1500);
    }
    
    // BUSCADOR
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', function(e) {
            const termino = e.target.value.toLowerCase().trim();
            
            if (termino === '') {
                mostrarProductos(productos);
                return;
            }
            
            const filtrados = productos.filter(producto => {
                const sku = aString(producto.SKU || producto.sku || producto.Name || '').toLowerCase();
                const descripcion = aString(producto.Description || producto.description || '').toLowerCase();
                return sku.includes(termino) || descripcion.includes(termino);
            });
            
            mostrarProductos(filtrados);
        });
    }
    </script>
</body>
</html>
