<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ATK products catalog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .search-box {
            margin-bottom: 30px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        
        input:focus {
            border-color: #007bff;
        }
        
        .results-info {
            margin-bottom: 20px;
            color: #666;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .product-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .product-sku {
            color: #007bff;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .product-description {
            font-size: 16px;
            margin-bottom: 15px;
            color: #333;
        }
        
        .product-photos {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .product-photos img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        
        .no-results {
            text-align: center;
            padding: 50px;
            color: #666;
            font-size: 18px;
        }
        
        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 ATK products catalog</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar por SKU o descripción...">
        </div>
        
        <div id="results" class="results-info"></div>
        <div id="productGrid" class="product-grid"></div>
    </div>

    <script>
    let productos = [];

    // Función para convertir a string seguro
    function aString(valor) {
        if (valor === null || valor === undefined) return '';
        return String(valor);
    }

    // Función para cargar fotos desde atkits.com (VERSIÓN CORREGIDA)
    function cargarFotos(sku, container) {
    // Limpiar el contenedor antes de empezar
    container.innerHTML = '<div style="font-size: 12px; color: #999;">⏳ Buscando fotos...</div>';
    
    let fotosEncontradas = 0;
    let peticionesCompletadas = 0;
    let timeoutActivo = true;
    const fotosUrls = [];
    
    // Función para finalizar (mostrar lo que se encontró)
    function finalizar() {
        if (!timeoutActivo) return;
        timeoutActivo = false;
        
        if (fotosUrls.length > 0) {
            let html = '';
            for (let url of fotosUrls) {
                html += `<img src="${url}" style="width: 80px; height: 80px; object-fit: cover; margin: 5px; border: 1px solid #ddd; border-radius: 4px;">`;
            }
            container.innerHTML = html;
        } else {
            container.innerHTML = '<div style="font-size: 12px; color: #999;">📁 No hay fotos disponibles para ' + sku + '</div>';
        }
    }
    
    // Probar hasta 9 fotos (_01 a _09)
    for (let i = 1; i <= 9; i++) {
        const numero = i.toString().padStart(2, '0');
        const url = `https://www.atkits.com/assets/images/gallery/OT/${sku}/${sku}_${numero}.png`;
        
        const img = new Image();
        let completado = false;
        
        // Timeout individual por cada foto (3 segundos)
        const timeoutId = setTimeout(() => {
            if (!completado) {
                completado = true;
                peticionesCompletadas++;
                if (peticionesCompletadas === 9) finalizar();
            }
        }, 3000);
        
        img.onload = function() {
            if (!completado) {
                completado = true;
                clearTimeout(timeoutId);
                fotosEncontradas++;
                fotosUrls.push(url);
                peticionesCompletadas++;
                if (peticionesCompletadas === 9) finalizar();
            }
        };
        
        img.onerror = function() {
            if (!completado) {
                completado = true;
                clearTimeout(timeoutId);
                peticionesCompletadas++;
                if (peticionesCompletadas === 9) finalizar();
            }
        };
        
        img.src = url;
    }
    
    // Timeout general por si alguna petición nunca responde
    setTimeout(() => {
        finalizar();
    }, 5000);
}
        
        function actualizarGaleria() {
            // Si ya terminamos de probar todas las 9 fotos
            if (verificarCompletado === 9) {
                if (fotosUrls.length > 0) {
                    // Mostrar las fotos encontradas
                    let html = '';
                    for (let url of fotosUrls) {
                        html += `<img src="${url}" style="width: 80px; height: 80px; object-fit: cover; margin: 5px; border: 1px solid #ddd; border-radius: 4px;">`;
                    }
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div style="font-size: 12px; color: #999;">📁 No hay fotos disponibles para ' + sku + '</div>';
                }
            }
        }
    }

    // Función para mostrar productos
    function mostrarProductos(productosFiltrados) {
        const grid = document.getElementById('productGrid');
        
        if (!productosFiltrados || productosFiltrados.length === 0) {
            grid.innerHTML = '<div class="no-results">😕 No se encontraron productos</div>';
            document.getElementById('results').innerHTML = `🔍 0 resultados`;
            return;
        }
        
        let html = '';
        for (let producto of productosFiltrados) {
            const sku = aString(producto.SKU || producto.sku || producto.Name || '');
            const descripcion = aString(producto.Description || producto.description || '');
            
            html += `
                <div class="product-card">
                    <div class="product-sku">🔖 SKU: ${sku}</div>
                    <div class="product-description">📝 ${descripcion || 'Sin descripción'}</div>
                    <div class="product-photos" id="fotos-${sku.replace(/[^a-zA-Z0-9]/g, '')}"></div>
                </div>
            `;
        }
        
        grid.innerHTML = html;
        document.getElementById('results').innerHTML = `🔍 ${productosFiltrados.length} resultados encontrados`;
        
        // Cargar fotos después de mostrar las tarjetas
        for (let producto of productosFiltrados) {
            const sku = aString(producto.SKU || producto.sku || producto.Name || '');
            const idFoto = `fotos-${sku.replace(/[^a-zA-Z0-9]/g, '')}`;
            const container = document.getElementById(idFoto);
            if (container) {
                cargarFotos(sku, container);
            }
        }
    }

    // Buscador con carga diferida y debounce
    const searchInput = document.getElementById('searchInput');
    let timeoutId = null;

    function buscar(termino) {
        if (termino === '') {
            mostrarProductos(productos);
            return;
        }
        
        const filtrados = productos.filter(producto => {
            const sku = aString(producto.SKU || producto.sku || producto.Name || '').toLowerCase();
            const descripcion = aString(producto.Description || producto.description || '').toLowerCase();
            return sku.includes(termino) || descripcion.includes(termino);
        });
        
        mostrarProductos(filtrados);
    }

    function cargarYBuscar(termino) {
        if (productos.length > 0) {
            buscar(termino);
            return;
        }
        
        document.getElementById('results').innerHTML = '⏳ Cargando productos por primera vez...';
        
        fetch('datos.json')
            .then(response => response.json())
            .then(data => {
                productos = data;
                document.getElementById('results').innerHTML = `📦 ${productos.length} productos cargados`;
                buscar(termino);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('productGrid').innerHTML = '<div class="no-results">❌ Error cargando datos.json</div>';
            });
    }

    if (searchInput) {
        searchInput.addEventListener('input', function(e) {
            const termino = e.target.value.toLowerCase().trim();
            
            // Esperar a que deje de escribir por 0.5 segundos
            if (timeoutId) clearTimeout(timeoutId);
            timeoutId = setTimeout(() => {
                cargarYBuscar(termino);
            }, 500);
        });
    }
    </script>
</body>
</html>
